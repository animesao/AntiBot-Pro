# ═══════════════════════════════════════════════════════════
# AntiBot Pro v2.1.0 - Продвинутая защита от ботов
# С Discord интеграцией и системой привязки аккаунтов
# ═══════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════
# Лимиты подключений
# ═══════════════════════════════════════════════════════════
limits:
  # Максимум подключений с одного IP за временное окно
  max-connections-per-ip: 5
  # Максимум подключений в секунду (глобально) - при превышении включается режим атаки
  max-connections-per-second: 30
  # Максимум аккаунтов с одного IP одновременно онлайн
  max-accounts-per-ip: 3
  # Временное окно в секундах для подсчета подключений
  time-window-seconds: 60
  # Длительность блокировки в минутах
  block-duration-minutes: 10

# ═══════════════════════════════════════════════════════════
# Основные настройки защиты
# ═══════════════════════════════════════════════════════════
protection:
  # Строгий режим - усиленная защита во время атаки
  strict-mode: true
  # Проверка никнеймов на валидность и подозрительные паттерны
  name-check: true
  # Разрешить никнеймы с большим количеством цифр (боты часто используют такие)
  allow-number-names: false

# ═══════════════════════════════════════════════════════════
# Проверка клиентов (обнаружение читов)
# ═══════════════════════════════════════════════════════════
client-check:
  # Включить проверку клиентов
  enabled: true
  # Кикать игроков с читерскими клиентами
  kick-cheat-clients: true
  # Кикать игроков, не отправивших бренд клиента
  kick-no-brand: false
  # Таймаут ожидания бренда клиента в секундах
  brand-check-timeout: 10

# ═══════════════════════════════════════════════════════════
# Проверка VPN/Proxy
# ═══════════════════════════════════════════════════════════
vpn-check:
  # Включить проверку VPN/Proxy
  enabled: true
  # Блокировать VPN/Proxy подключения
  block-vpn: true
  # API ключ для proxycheck.io (оставьте пустым для базовой проверки)
  api-key: ""

# ═══════════════════════════════════════════════════════════
# Географическая блокировка
# ═══════════════════════════════════════════════════════════
geo-block:
  # Включить гео-блокировку
  enabled: false
  # Режим белого списка (true = только из разрешенных стран)
  whitelist-mode: false
  # Разрешенные страны (ISO коды)
  allowed-countries:
    - RU
    - UA
    - BY
    - KZ
  # Заблокированные страны (ISO коды)
  blocked-countries: []

# ═══════════════════════════════════════════════════════════
# Discord Webhook - Уведомления в Discord
# ═══════════════════════════════════════════════════════════
discord:
  # Webhook URL для отправки уведомлений
  # Получите его в настройках канала Discord -> Интеграции -> Вебхуки
  webhook-url: ""

  # Включить/выключить Discord уведомления
  enabled: true

  # Имя бота которое будет отображаться в Discord
  bot-name: "AntiBot Pro"

  # URL аватара бота (оставьте пустым для стандартного)
  avatar-url: ""

  # Маскировать IP адреса (true = 192.168.***.*** | false = полный IP)
  mask-ip: false

  # Какие события логировать в Discord
  log-events:
    # Вход игрока на сервер (показывает ник, IP, страну, клиент)
    player-join: true
    # Выход игрока с сервера (показывает время сессии)
    player-leave: false
    # Обнаружение читерского клиента
    cheat-detection: true
    # Обнаружение VPN/Proxy
    vpn-detection: true
    # Обнаружение бота
    bot-detection: true
    # Блокировка IP адреса
    ip-block: true
    # Кик игрока
    player-kick: true
    # Включение/выключение режима атаки
    attack-mode: true
    # Подозрительный никнейм
    suspicious-name: true

  # Цвета embed сообщений (HEX формат с # или без)
  colors:
    join: "#00FF00" # Зеленый - вход игрока
    leave: "#808080" # Серый - выход игрока
    cheat: "#FF0000" # Красный - читерский клиент
    vpn: "#FFA500" # Оранжевый - VPN/Proxy
    bot: "#FF4500" # Оранжево-красный - бот
    block: "#8B0000" # Темно-красный - блокировка IP
    kick: "#DC143C" # Малиновый - кик игрока
    attack: "#FF0000" # Красный - режим атаки
    suspicious: "#FFFF00" # Желтый - подозрительный ник

# ═══════════════════════════════════════════════════════════
# Discord Bot - Полноценный бот для управления сервером
# ═══════════════════════════════════════════════════════════
discord-bot:
  # Включить Discord бота
  enabled: false

  # Токен бота (получите на https://discord.com/developers/applications)
  # 1. Создайте приложение на Discord Developer Portal
  # 2. Перейдите в раздел "Bot" и создайте бота
  # 3. Скопируйте токен и вставьте сюда
  bot-token: ""

  # Название сервера для отображения в статусе бота
  server-name: "Minecraft Server"

  # Включить систему привязки аккаунтов через бота
  account-linking-enabled: true

  # Включить DM верификацию (код отправляется в ЛС)
  dm-verification-enabled: true

  # Включить whitelist для команд (только определенные сервера)
  command-whitelist-enabled: false

  # Разрешенные сервера (ID серверов Discord)
  # Получите ID через /devmode в Discord и ПКМ по серверу -> Копировать ID
  allowed-guilds: []

  # Разрешенные роли для доступа к командам
  allowed-roles: []

  # Роли администраторов (полный доступ ко всем командам)
  admin-roles: []

# ═══════════════════════════════════════════════════════════
# Система привязки аккаунтов Minecraft <-> Discord
# ═══════════════════════════════════════════════════════════
account-linking:
  # Автоматически добавлять привязанные аккаунты в whitelist
  auto-whitelist: false

  # Отправлять уведомления в ЛС Discord при входе на сервер
  dm-notification: true

  # Максимум аккаунтов Minecraft на один Discord аккаунт
  max-per-discord: 3

  # Требовать верификацию через DM перед привязкой
  require-verification: false

  # Доверенные роли Discord (игроки с этими ролями проходят упрощенную проверку)
  trusted-roles: []

# ═══════════════════════════════════════════════════════════
# Белые списки
# ═══════════════════════════════════════════════════════════
whitelist:
  # IP адреса, которые не проверяются
  ips: []
  # Никнеймы игроков, которые не проверяются
  players: []

# ═══════════════════════════════════════════════════════════
# Сообщения для игроков
# ═══════════════════════════════════════════════════════════
messages:
  blocked: "Вы заблокированы! Попробуйте позже."
  rate-limit: "Слишком много подключений! Подождите немного."
  max-accounts: "Превышен лимит аккаунтов с вашего IP!"
  attack-mode: "Сервер под защитой. Попробуйте позже."
  invalid-name: "Недопустимый никнейм!"
  cheat-client: "Обнаружен запрещенный клиент!"
  vpn-blocked: "VPN/Proxy запрещены на этом сервере!"
  geo-blocked: "Подключение из вашего региона заблокировано!"
  no-brand: "Ваш клиент не прошел проверку!"

# ═══════════════════════════════════════════════════════════
# Настройки производительности
# ═══════════════════════════════════════════════════════════
performance:
  # Размер кэша для GeoIP (макс. количество IP в памяти)
  geoip-cache-size: 10000
  # Размер кэша для VPN проверки
  vpn-cache-size: 5000
  # Интервал очистки кэшей в секундах
  cleanup-interval: 60
  # Размер пула потоков для async операций
  async-thread-pool-size: 4
  # Таймаут для API запросов (секунды)
  api-timeout-seconds: 5
  # Максимум одновременных API запросов
  max-concurrent-api-requests: 10
  # Включить метрики производительности
  metrics-enabled: false

# ═══════════════════════════════════════════════════════════
# Rate limiting для API
# ═══════════════════════════════════════════════════════════
api-rate-limiting:
  # ip-api.com: 45 запросов/минуту (бесплатный план)
  geoip-requests-per-minute: 40
  # proxycheck.io зависит от плана
  vpn-requests-per-minute: 100

# ═══════════════════════════════════════════════════════════
# Расширенная защита
# ═══════════════════════════════════════════════════════════
advanced-protection:
  # Fingerprinting клиентов (по версии протокола, настройкам)
  client-fingerprinting: true
  # Honeypot - фейковый сервер для ботов
  honeypot-enabled: false
  honeypot-server: "lobby-fake"
  # CAPTCHA после N неудачных попыток
  captcha-after-failures: 3
  # Временная блокировка после CAPTCHA
  captcha-cooldown-minutes: 5
  # Machine Learning детекция (экспериментально)
  ml-detection-enabled: false

# ═══════════════════════════════════════════════════════════
# Логирование
# ═══════════════════════════════════════════════════════════
logging:
  # Уровень логов (DEBUG, INFO, WARN, ERROR)
  level: INFO
  # Логировать в файл
  file-logging: true
  # Максимальный размер лог-файла (MB)
  max-file-size-mb: 10
  # Количество архивных файлов
  max-backup-files: 5
  # Детальное логирование для отладки
  debug-mode: false

# ═══════════════════════════════════════════════════════════
# Web Dashboard - Мониторинг через браузер
# ═══════════════════════════════════════════════════════════
web-dashboard:
  # Включить Web Dashboard
  enabled: true
  
  # Порт для доступа
  port: 8080
  
  # IP адрес для привязки
  # "127.0.0.1" - только локальный доступ (безопасно)
  # "0.0.0.0" - доступ с любого IP (для хостинга)
  # "ВАШ_IP" - доступ только с конкретного IP
  bind-address: "127.0.0.1"
  
  # Базовая аутентификация (опционально)
  # Оставьте пустым для отключения
  username: ""
  password: ""
  
  # CORS настройки для API
  cors-enabled: false
  allowed-origins: "*"

# ═══════════════════════════════════════════════════════════
# ВАЖНО: Настройка для хостинга
# ═══════════════════════════════════════════════════════════
# Если вы размещаете сервер на хостинге:
#
# 1. Локальный доступ (только с сервера):
#    bind-address: "127.0.0.1"
#    URL: http://localhost:8080
#
# 2. Удалённый доступ (с любого места):
#    bind-address: "0.0.0.0"
#    URL: http://ВАШ_IP_СЕРВЕРА:8080
#    Пример: http://123.45.67.89:8080
#
# 3. Доменное имя (если настроен DNS):
#    bind-address: "0.0.0.0"
#    URL: http://ваш-домен.com:8080
#
# 4. С Nginx/Apache (рекомендуется):
#    bind-address: "127.0.0.1"
#    Настройте reverse proxy на порт 8080
#    URL: https://ваш-домен.com/antibot
#
# БЕЗОПАСНОСТЬ:
# - Используйте username/password для защиты
# - Настройте firewall для ограничения доступа
# - Используйте HTTPS через Nginx/Apache
# - Не открывайте порт 8080 в интернет без защиты
# ═══════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════
# Мониторинг и алерты
# ═══════════════════════════════════════════════════════════
monitoring:
  # Prometheus метрики
  prometheus-enabled: false
  prometheus-port: 9090
  
  # Алерты в Discord при критических событиях
  alerts:
    # Атака обнаружена (подключений/сек)
    attack-detected-threshold: 50
    # Высокая нагрузка (процентов CPU)
    high-load-threshold: 80
    # Ошибки API (ошибок/минуту)
    api-error-threshold: 10

# ═══════════════════════════════════════════════════════════
# Примеры использования
# ═══════════════════════════════════════════════════════════
#
# 1. Настройка Discord Webhook:
#    - Создайте webhook в настройках канала Discord
#    - Вставьте URL в discord.webhook-url
#
# 2. Настройка Discord Бота:
#    - Создайте приложение на https://discord.com/developers/applications
#    - Создайте бота и скопируйте токен
#    - Пригласите бота на сервер с правами:
#      • Send Messages
#      • Embed Links
#      • Use Slash Commands
#      • Read Message History
#    - Вставьте токен в discord-bot.bot-token
#
# 3. Привязка аккаунтов:
#    - Игрок использует команду /link <ник> в Discord
#    - Или /verify для получения кода верификации
#
# 4. Команды Discord бота:
#    /link <ник>        - Привязать Minecraft аккаунт
#    /unlink            - Отвязать Minecraft аккаунт
#    /verify            - Получить код верификации в ЛС
#    /status            - Статус сервера
#    /online            - Игроки онлайн
#    /stats             - Статистика AntiBot (админ)
#    /reload            - Перезагрузить конфиг (админ)
#    /check <игрок>     - Проверить игрока (админ)
#    /whitelist ...     - Управление whitelist (админ)
#
# 5. Команды в игре:
#    /antibot linked <player/discord> <value> - Проверить привязку
#    /antibot discord status - Статус Discord бота
#    /antibot accounts - Статистика привязанных аккаунтов
# ═══════════════════════════════════════════════════════════
